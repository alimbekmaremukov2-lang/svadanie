<!DOCTYPE html>
<!-- saved from url=(0048)file:///C:/Users/allmo/Downloads/svadanie_4.html -->
<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Приглашение</title>
<script src="./index_files/email.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff0f5 0%, #fff8f0 100%);
  min-height: 100vh;
}

.screen { display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; text-align: center; min-height: 100vh; width: 100%; }
.screen.active { display: flex; }

h1 { font-size: 26px; font-weight: 700; color: #2d1a24; margin-bottom: 1.5rem; line-height: 1.4; }
.hearts { font-size: 44px; margin-bottom: 1.2rem; }
.subtitle { font-size: 16px; color: #9e7080; margin-bottom: 2rem; }

/* КНОПКА ДА */
.btn-yes {
  background: linear-gradient(135deg, #e8547a, #c0395f);
  color: #fff; border: none; border-radius: 50px;
  font-size: 18px; font-weight: 600; padding: 16px 52px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(192,57,95,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-yes:hover { transform: scale(1.05); }
.btn-yes:active { transform: scale(0.97); }

/* КНОПКА НЕТ — всегда fixed, видна */
#btnNo {
  position: fixed;
  background: #fff;
  color: #aaa;
  border: 1.5px solid #e0e0e0;
  border-radius: 50px;
  font-size: 15px;
  padding: 12px 30px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  z-index: 999;
  transition: left 0.18s ease, top 0.18s ease;
  /* начальная позиция — правый нижний угол, зададим через JS */
}

/* КАРТОЧКИ */
.datetime-row {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  width: 100%; max-width: 700px; margin-bottom: 1.5rem;
}
.card {
  background: #fff; border-radius: 20px; padding: 1.25rem;
  box-shadow: 0 4px 24px rgba(200,100,130,0.1);
  flex: 1; min-width: 280px; max-width: 340px;
}
.card-title {
  font-size: 14px; font-weight: 600; color: #2d1a24;
  margin-bottom: 12px; text-align: center;
}

/* КАЛЕНДАРЬ */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav {
  background: #f9f0f4; border: none; cursor: pointer;
  color: #c0395f; padding: 6px 12px; border-radius: 50px;
  font-size: 18px; font-weight: 700; line-height: 1;
}
.cal-nav:hover { background: #f0dde6; }
.cal-month { font-size: 14px; font-weight: 600; color: #2d1a24; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-name { font-size: 10px; color: #bba0a8; text-align: center; padding: 3px 0; font-weight: 600; }
.cal-day {
  font-size: 12px; color: #2d1a24; text-align: center; padding: 6px 0;
  border-radius: 50%; cursor: pointer;
}
.cal-day:hover { background: #fce8ef; }
.cal-day.selected { background: #e8547a; color: #fff; font-weight: 700; }
.cal-day.past { color: #ddd; cursor: default; pointer-events: none; }
.cal-day.empty { pointer-events: none; }

/* ВРЕМЯ */
.time-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.time-btn {
  background: #fff5f8; border: 1.5px solid #f0c0d0; border-radius: 10px;
  padding: 9px 4px; font-size: 13px; font-weight: 500; color: #2d1a24;
  cursor: pointer; text-align: center; transition: all 0.12s;
}
.time-btn:hover { background: #fce8ef; border-color: #e8547a; }
.time-btn.selected { background: #e8547a; color: #fff; border-color: #e8547a; }

/* ПРЕДПОЧТЕНИЯ */
.chosen-info { display: none; margin-top: 1.5rem; width: 100%; max-width: 400px; }
.chosen-summary { font-size: 15px; color: #9e7080; margin-bottom: 1rem; }
.prefs-label { font-size: 14px; color: #bba0a8; margin-bottom: 0.75rem; }
.prefs-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.pref-btn {
  background: #fff; border: 1.5px solid #f0c0d0; border-radius: 16px;
  padding: 16px 14px; cursor: pointer; font-size: 13px; color: #2d1a24;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  width: 115px; font-weight: 500; line-height: 1.3;
  box-shadow: 0 2px 10px rgba(200,100,130,0.08);
  transition: all 0.15s;
}
.pref-btn:hover { border-color: #e8547a; background: #fff0f5; transform: translateY(-2px); }
.pref-icon { font-size: 28px; }

/* ФИНАЛ */
.finish-icon { font-size: 64px; margin-bottom: 1rem; }
.finish-title { font-size: 24px; font-weight: 700; color: #2d1a24; margin-bottom: 0.75rem; }
.finish-sub { font-size: 15px; color: #9e7080; line-height: 1.7; max-width: 280px; }
.badge {
  font-size: 14px; color: #c0395f; background: #fff0f5; border-radius: 50px;
  padding: 8px 20px; display: inline-block; margin-top: 1.5rem;
  border: 1px solid #f0c0d0; font-weight: 500;
}
</style>
</head>
<body>

<!-- ЭКРАН 1 -->
<div id="screen1" class="screen active">
  <div class="hearts">💕</div>
  <h1>Ты пойдёшь со мной<br>на свидание?</h1>
  <p class="subtitle">Я очень надеюсь на твой ответ 🥺</p>
  <button class="btn-yes" onclick="goYes()">Да &nbsp;💖</button>
</div>

<!-- КНОПКА НЕТ — вне экранов, всегда поверх -->
<button id="btnNo" onmouseenter="doMoveNo()" ontouchstart="doMoveNoTouch(event)" style="left: 1756px; top: 728px;">Нет</button>

<!-- ЭКРАН 2 -->
<div id="screen2" class="screen">
  <div class="hearts">🎉</div>
  <h1>Ура! Ты согласилась! 🥰</h1>
  <p class="subtitle">Когда ты свободна?</p>

  <div class="datetime-row">
    <div class="card">
      <div class="card-title">📅 Выбери дату</div>
      <div class="cal-header">
        <button class="cal-nav" onclick="prevMonth()">‹</button>
        <span class="cal-month" id="calMonthLabel"></span>
        <button class="cal-nav" onclick="nextMonth()">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="card">
      <div class="card-title">🕐 Выбери время</div>
      <div class="time-grid" id="timeGrid"></div>
    </div>
  </div>

  <div class="chosen-info" id="chosenInfo">
    <div class="chosen-summary">📅 <strong id="chosenDateLabel"></strong> &nbsp;🕐 <strong id="chosenTimeLabel"></strong></div>
    <div class="prefs-label">Что тебе больше нравится?</div>
    <div class="prefs-row">
      <button class="pref-btn" onclick="choosePref(&#39;Выставки / музеи&#39;)">
        <span class="pref-icon">🏛️</span>Выставки / музеи
      </button>
      <button class="pref-btn" onclick="choosePref(&#39;Кофе / рестораны&#39;)">
        <span class="pref-icon">☕</span>Кофе / рестораны
      </button>
      <button class="pref-btn" onclick="choosePref(&#39;На твой выбор&#39;)">
        <span class="pref-icon">✨</span>На твой выбор
      </button>
    </div>
  </div>
</div>

<!-- ЭКРАН 3 -->
<div id="screen3" class="screen">
  <div class="finish-icon">💌</div>
  <div class="finish-title">Спасибо за ответ!</div>
  <div class="finish-sub">Ожидай приглашение — я всё организую и напишу совсем скоро 🌹</div>
  <div class="badge" id="sendBadge">Отправляю...</div>
</div>

<script>
emailjs.init('a3KawCouv6zDwrwGh');

// ======= КНОПКА НЕТ =======
const btnNo = document.getElementById('btnNo');

function placeNoBtn() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  btnNo.style.left = Math.max(10, vw / 2 + 60) + 'px';
  btnNo.style.top = Math.max(10, vh / 2 + 60) + 'px';
}
placeNoBtn();

function doMoveNo() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const w = btnNo.offsetWidth || 80;
  const h = btnNo.offsetHeight || 44;
  const curX = parseFloat(btnNo.style.left) || 0;
  const curY = parseFloat(btnNo.style.top) || 0;
  let x, y, tries = 0;
  do {
    x = 10 + Math.random() * (vw - w - 20);
    y = 10 + Math.random() * (vh - h - 20);
    tries++;
  } while (tries < 20 && Math.abs(x - curX) < 100 && Math.abs(y - curY) < 100);
  btnNo.style.left = x + 'px';
  btnNo.style.top = y + 'px';
}

function doMoveNoTouch(e) {
  e.preventDefault();
  doMoveNo();
}

window.addEventListener('resize', placeNoBtn);

// ======= ЭКРАНЫ =======
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let calYear, calMonth, selectedDate = null, selectedTime = null;

function goYes() {
  btnNo.style.display = 'none';
  show('screen2');
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCal();
  renderTime();
}

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function renderCal() {
  document.getElementById('calMonthLabel').textContent = MONTHS[calMonth] + ' ' + calYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS_RU.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });
  let startDow = new Date(calYear, calMonth, 1).getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div'); el.className = 'cal-day'; el.textContent = d;
    const thisDate = new Date(calYear, calMonth, d);
    if (thisDate < today) {
      el.classList.add('past');
    } else {
      if (selectedDate && selectedDate.getTime() === thisDate.getTime()) el.classList.add('selected');
      el.onclick = () => pickDay(d);
    }
    grid.appendChild(el);
  }
}

function renderTime() {
  const grid = document.getElementById('timeGrid');
  grid.innerHTML = '';
  ['10:00','11:00','12:00','13:00','14:00','15:00',
   '16:00','17:00','18:00','19:00','20:00','21:00'].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'time-btn' + (selectedTime === t ? ' selected' : '');
    btn.textContent = t;
    btn.onclick = () => pickTime(t);
    grid.appendChild(btn);
  });
}

function pickDay(d) {
  selectedDate = new Date(calYear, calMonth, d);
  renderCal();
  document.getElementById('chosenDateLabel').textContent = d + ' ' + MONTHS[calMonth] + ' ' + calYear;
  checkShowPrefs();
}

function pickTime(t) {
  selectedTime = t;
  renderTime();
  document.getElementById('chosenTimeLabel').textContent = t;
  checkShowPrefs();
}

function checkShowPrefs() {
  if (selectedDate && selectedTime) {
    const info = document.getElementById('chosenInfo');
    info.style.display = 'block';
    setTimeout(() => info.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }
}

function prevMonth() {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal();
}
function nextMonth() {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal();
}

function choosePref(pref) {
  const dateStr = selectedDate
    ? selectedDate.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'})
    : 'не выбрана';
  show('screen3');
  emailjs.send('service_3hda9on', 'template_82gndj3', {
    to_email: 'alimbekmaremukov2@gmail.com',
    subject: '🌹 Ответ на приглашение на свидание',
    name: 'Она согласилась! 🎉',
    message: 'Дата: ' + dateStr + '\nВремя: ' + (selectedTime || '—') + '\nПредпочтение: ' + pref
  }).then(function() {
    document.getElementById('sendBadge').textContent = '✓ Письмо отправлено!';
  }, function(err) {
    document.getElementById('sendBadge').textContent = '⚠️ Ошибка отправки';
    console.error(err);
  });
}
</script>


</body></html>
